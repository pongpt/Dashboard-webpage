<!DOCTYPE html>
<html lang="th">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE TU Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard/css/home.css' %}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="{% url 'home' %}" class="logo-link">
            <img src="{% static 'dashboard/tu_logo.png' %}" alt="Thammasat University">
        </a>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-title">
                <span class="one">ONE </span><span class="t">T</span><span class="u">U</span>
            </div>
            <div class="hero-subtitle">DASHBOARD</div>
            <a href="{% url 'dashboard_student' %}" class="btn-enter">
            เข้าชมแดชบอร์ด
            <span class="arrow">&#10148;</span>
            </a>
        </div>
    </section>

</body>
</html>
